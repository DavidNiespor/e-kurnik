# docker-compose.yml — Portainer Stack
# Zmienne środowiskowe do ustawienia w Portainer → Stack → Environment variables:
#   GH_IMAGE                 = ghcr.io/TWOJ_USER/ferma-jaj:latest
#   SECRET_KEY               = losowy ciąg 32+ znaków
#   CLOUDFLARE_TUNNEL_TOKEN  = token z Cloudflare Zero Trust

services:
  ferma:
    image: ${GH_IMAGE:-ghcr.io/changeme/ferma-jaj:latest}
    container_name: ferma_app
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - ferma_data:/data
    environment:
      - FERMA_DATA_DIR=/data
      - SECRET_KEY=${SECRET_KEY:-zmien-mnie}
      - TZ=Europe/Warsaw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - ferma_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ferma_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      ferma:
        condition: service_healthy
    networks:
      - ferma_net

  watchtower:
    image: containrrr/watchtower:latest
    container_name: ferma_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_ROLLING_RESTART=true
      - TZ=Europe/Warsaw
    networks:
      - ferma_net

  portainer_agent:
    image: portainer/agent:latest
    container_name: ferma_portainer_agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    expose:
      - "9001"
    networks:
      - ferma_net

volumes:
  ferma_data:
    driver: local

networks:
  ferma_net:
    driver: bridge
