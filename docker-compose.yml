# Ferma Jaj SaaS — kompletny stack
# Dodaj przez Portainer: Stacks → Add stack → wklej lub wskaż repo
#
# Wymagane zmienne środowiskowe (Portainer → stack → env):
#   CLOUDFLARE_TUNNEL_TOKEN  — token tunelu z Cloudflare Zero Trust
#   SECRET_KEY               — losowy ciąg 32+ znaków (sesje Flask)
#   GH_IMAGE                 — np. ghcr.io/twoj_user/ferma-jaj:latest

services:

  # ── Aplikacja główna ──────────────────────────────────────────────────────
  ferma:
    image: ${GH_IMAGE:-ghcr.io/changeme/ferma-jaj:latest}
    container_name: ferma_app
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - ferma_data:/data
    environment:
      - FERMA_DATA_DIR=/data
      - SECRET_KEY=${SECRET_KEY:-zmien-mnie-na-losowy-ciag}
      - TZ=Europe/Warsaw
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - ferma_net

  # ── Cloudflare Tunnel — HTTPS bez otwierania portów ──────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ferma_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      ferma:
        condition: service_healthy
    networks:
      - ferma_net

  # ── Watchtower — automatyczne aktualizacje z GHCR ─────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: ferma_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_ROLLING_RESTART=true
      - TZ=Europe/Warsaw
    networks:
      - ferma_net

  # ── Portainer Agent — zarządzanie z Portainer Cloud lub lokalnie ──────────
  portainer_agent:
    image: portainer/agent:latest
    container_name: ferma_portainer_agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    expose:
      - "9001"
    networks:
      - ferma_net

volumes:
  ferma_data:
    driver: local

networks:
  ferma_net:
    driver: bridge
